<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | Stratum Asset Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #050816;
      --card: #0f172a;
      --accent: #38bdf8;
      --text: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      max-width: 640px;
      padding: 2.5rem 2rem;
      background: linear-gradient(145deg, #020617, var(--card));
      border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(15,23,42,0.9);
      text-align: left;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.9rem;
    }
    p {
      margin: 0.4rem 0;
      line-height: 1.6;
    }
    .next {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #9ca3af;
    }
    a.btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      background: var(--accent);
      color: #0b1120;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrapper" aria-labelledby="thankyou-title">
    <h1 id="thankyou-title">Message received.</h1>
    <p>Thanks for reaching out to Stratum Asset Intelligence.</p>
    <p>We’ll review your message and typically respond within one business day.</p>
    <p class="next">If your request is urgent, you can also follow up via the contact details on our main Contact page.</p>
    <a class="btn" href="/contact.html">Back to Contact</a>
  </main>
</body>
</html>
